# CI — lightweight test suite on every push/PR.
# Full Tauri build is in build-release.yml (main/tags only).
# This runs unit tests only — no compile, fast feedback.

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: HIVE/desktop/package.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'HIVE/desktop/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: HIVE/desktop
        run: npm install

      - name: TypeScript type check
        working-directory: HIVE/desktop
        run: npx tsc --noEmit

      - name: Run TypeScript tests
        working-directory: HIVE/desktop
        run: npx vitest run

      - name: Run Rust tests
        working-directory: HIVE/desktop/src-tauri
        run: cargo test
