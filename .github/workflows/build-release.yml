name: Build HIVE Desktop

on:
  push:
    branches: [main, claude/*]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'HIVE/desktop/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: HIVE/desktop
        run: npm install

      - name: TypeScript type check
        working-directory: HIVE/desktop
        run: npx tsc --noEmit

      - name: Run TypeScript tests
        working-directory: HIVE/desktop
        run: npm test

      - name: Run Rust tests
        working-directory: HIVE/desktop/src-tauri
        run: cargo test

      - name: Build Tauri app
        working-directory: HIVE/desktop
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: hive-windows-exe
          path: |
            HIVE/desktop/src-tauri/target/release/HIVE.exe
            HIVE/desktop/src-tauri/target/release/bundle/msi/*.msi
            HIVE/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # Create release when tagged
  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: hive-windows-exe
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/**/*.exe
            ./artifacts/**/*.msi
          draft: false
          prerelease: false
          generate_release_notes: true
